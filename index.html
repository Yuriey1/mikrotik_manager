<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikroTik Device Manager</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>[v-cloak]{display:none}</style>
</head>
<body>
    <div id="app" v-cloak>
        <app-header></app-header>
        <div class="main-layout">
            <device-sidebar></device-sidebar>
            <div class="content">
                <tab-bar></tab-bar>
                <subscriber-tab v-if="store.activeTab === 'subscribers'"></subscriber-tab>
                <queue-tab v-if="store.activeTab === 'queues'"></queue-tab>
            </div>
        </div>
        <loading-overlay></loading-overlay>
        <error-modal></error-modal>
        <netbox-config-modal></netbox-config-modal>
        <ip-selector-modal></ip-selector-modal>
        <credentials-modal></credentials-modal>
        <subscriber-modal></subscriber-modal>
        <mac-replace-modal></mac-replace-modal>
        <delete-confirm-modal></delete-confirm-modal>
    </div>

    <!-- ====== APP HEADER ====== -->
    <template id="app-header">
        <header>
            <h1><i class="fas fa-router"></i> MikroTik Device Manager</h1>
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot" :class="{ connected: store.connected, connecting: store.connecting }"></span>
                    <span>{{ store.connecting ? 'Подключение...' : (store.connected ? 'Подключено' : 'Не подключено') }}</span>
                </div>
                <div class="status-item">
                    <i class="fas fa-server"></i>
                    <span>{{ deviceTitle }}</span>
                </div>
                <div class="status-item">
                    <i class="fas fa-sitemap"></i>
                    <span>Очередей: {{ queueCount }}</span>
                </div>
                <div class="status-item">
                    <span class="status-dot" :class="{ connected: store.netboxConfigured }"></span>
                    <span>{{ netboxLabel }}</span>
                </div>
                <div class="status-item">
                    <button class="btn btn-primary" @click="refreshDevices" style="padding: 6px 12px; font-size: 13px;">
                        <i class="fas fa-sync-alt"></i> Обновить
                    </button>
                </div>
                <div class="status-item">
                    <button v-if="store.connected" class="btn btn-danger" @click="doDisconnect"
                            style="padding: 6px 12px; font-size: 13px;">
                        <i class="fas fa-unlink"></i> Отключиться
                    </button>
                </div>
            </div>
        </header>
    </template>

    <!-- ====== DEVICE SIDEBAR ====== -->
    <template id="device-sidebar">
        <div class="sidebar">
            <div class="device-section">
                <h2>
                    <i class="fas fa-server"></i> Устройства
                    <button class="btn btn-secondary" @click="openNetBoxConfig"
                            style="margin-left: auto; padding: 4px 8px; font-size: 12px;" title="Настройки NetBox">
                        <i class="fas fa-cog"></i>
                    </button>
                </h2>
                <div class="device-search-container">
                    <i class="fas fa-search device-search-icon"></i>
                    <input type="text" v-model="searchQuery" class="device-search-input"
                           placeholder="Быстрый поиск устройства..." autocomplete="off">
                    <button v-if="searchQuery" class="device-search-clear" @click="searchQuery = ''">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="device-list-container">
                    <div class="device-list-header">
                        <span>Список устройств</span>
                        <span class="device-count">{{ filteredDevices.length }}</span>
                    </div>
                    <div class="device-list-scroll">
                        <ul class="device-list">
                            <li v-if="store.devicesLoading" class="device-item">
                                <div class="device-card">
                                    <div class="device-name" style="text-align:center;">
                                        <i class="fas fa-spinner fa-spin"></i> Загрузка...
                                    </div>
                                </div>
                            </li>
                            <li v-else-if="filteredDevices.length === 0" class="device-item">
                                <div class="device-card">
                                    <div class="device-name" style="text-align:center;">Нет устройств</div>
                                </div>
                            </li>
                            <li v-for="d in filteredDevices" :key="d.name" class="device-item">
                                <div class="device-card" :class="{ connected: store.currentDevice === d.name && store.connected }">
                                    <div class="device-name">{{ d.name }}</div>
                                    <div class="device-ip">{{ d.ip }}</div>
                                    <div class="device-type" v-if="d.device_type">{{ d.device_type }}</div>
                                    <div v-if="store.currentDevice === d.name && store.connected" class="device-status-label">✓ Подключено</div>
                                    <div class="device-actions">
                                        <button v-if="store.currentDevice === d.name && store.connected"
                                                @click="doDisconnect" class="btn btn-danger btn-sm">
                                            <i class="fas fa-unlink"></i>
                                        </button>
                                        <button v-else @click="doConnect(d.name)" class="btn btn-primary btn-sm"
                                                :disabled="store.connecting">
                                            <i v-if="store.connecting && store.connectingDevice === d.name" class="fas fa-spinner fa-spin"></i>
                                            <i v-else class="fas fa-plug"></i>
                                            {{ store.connecting && store.connectingDevice === d.name ? 'Подключение...' : 'Подключиться' }}
                                        </button>
                                    </div>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
                <button class="btn btn-primary w-full" @click="loadDevices" style="margin-top: 10px; padding: 8px;">
                    <i class="fas fa-sync-alt"></i> Обновить список
                </button>
            </div>
            <div class="section">
                <h2><i class="fas fa-cog"></i> Настройки</h2>
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" v-model="store.autoSavePassword">
                        <span>Сохранять пароли</span>
                    </label>
                </div>
                <div class="form-group">
                    <label>Имя пользователя по умолчанию</label>
                    <input type="text" v-model="store.defaultUsername">
                </div>
                <button class="btn btn-success w-full" @click="doSaveSettings">
                    <i class="fas fa-save"></i> Сохранить настройки
                </button>
            </div>
        </div>
    </template>

    <!-- ====== TAB BAR ====== -->
    <template id="tab-bar">
        <div class="tab-container">
            <div v-for="t in tabs" :key="t.key" class="tab"
                 :class="{ active: store.activeTab === t.key }"
                 @click="store.activeTab = t.key">
                <i :class="'fas ' + t.icon"></i> {{ t.label }}
            </div>
        </div>
    </template>

    <!-- ====== SUBSCRIBER TAB ====== -->
    <template id="subscriber-tab">
        <div class="tab-content active">
            <div v-if="!store.connected" class="empty-state" style="padding: 60px 0; text-align: center;">
                <i class="fas fa-plug" style="font-size: 48px; color: var(--text-muted);"></i>
                <p style="margin-top: 16px; color: var(--text-secondary);">Подключитесь к устройству для загрузки абонентов</p>
            </div>
            <div v-else class="subscribers-section">
                <!-- Toolbar -->
                <div class="subscribers-toolbar">
                    <div class="subscribers-search">
                        <i class="fas fa-search"></i>
                        <input type="text" v-model="searchText" placeholder="Поиск абонента (IP или ФИО)...">
                    </div>
                    <div class="subscribers-filters">
                        <select v-model="poolFilter" @change="filterByPool">
                            <option value="">Все пулы</option>
                            <option v-for="p in store.dhcpPools" :key="p.name" :value="p.name">{{ p.name }}</option>
                        </select>
                        <button class="btn btn-primary" @click="openAddModal">
                            <i class="fas fa-plus"></i> Добавить абонента
                        </button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="subscribers-stats">
                    <span class="stat-item"><i class="fas fa-users"></i> Абонентов: <strong>{{ store.subscribers.length }}</strong></span>
                    <span class="stat-item"><i class="fas fa-filter"></i> Показано: <strong>{{ filteredSubscribers.length }}</strong></span>
                </div>

                <!-- Table -->
                <div class="subscribers-table-container">
                    <table class="subscribers-table">
                        <thead>
                            <tr>
                                <th class="col-inet">🌐</th>
                                <th class="col-ip">IP адрес</th>
                                <th class="col-mac">MAC адрес</th>
                                <th class="col-position">Должность</th>
                                <th class="col-comment">ФИО</th>
                                <th class="col-actions" style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="sub in filteredSubscribers" :key="sub.ip" @click="selectSubscriber(sub)" :class="{ selected: selectedIp === sub.ip }">
                                <td class="col-inet clickable" @click.stop="toggleNet(sub)">
                                    <i :class="'fas ' + (hasInternet(sub.ip) ? 'fa-globe' : 'fa-globe')"
                                       :style="{ color: hasInternet(sub.ip) ? 'var(--success)' : 'var(--text-muted)', fontSize: '16px' }"></i>
                                </td>
                                <td class="col-ip"><code>{{ sub.ip }}</code></td>
                                <td class="col-mac">{{ sub.mac || '—' }}</td>
                                <td class="col-position">{{ parsePosition(sub.comment) }}</td>
                                <td class="col-comment">{{ parseName(sub.comment) }}</td>
                                <td class="col-actions">
                                    <div class="action-dropdown" style="position: relative;">
                                        <button class="btn btn-sm" @click.stop="toggleMenu(sub)" style="padding: 2px 8px;">
                                            <i class="fas fa-ellipsis-v"></i>
                                        </button>
                                        <div v-if="openMenuIp === sub.ip" class="dropdown-menu" @click.stop style="right: 0; display: block;">
                                            <a href="#" @click.prevent="editSubscriber(sub)"><i class="fas fa-edit"></i> Редактировать</a>
                                            <a href="#" @click.prevent="openMacReplace(sub)"><i class="fas fa-exchange-alt"></i> Заменить MAC</a>
                                            <a href="#" @click.prevent="copySubscriber(sub)"><i class="fas fa-copy"></i> Копировать</a>
                                            <a href="#" @click.prevent="confirmDelete(sub)"><i class="fas fa-trash-alt"></i> Удалить</a>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr v-if="filteredSubscribers.length === 0 && store.subscribers.length > 0">
                                <td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted);">Ничего не найдено</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <!-- ====== SUBSCRIBER MODAL (add/edit) ====== -->
    <template id="subscriber-modal">
        <div v-if="showModal" class="modal-overlay" @click.self="closeModal">
            <div class="subscriber-modal-content">
                <div class="modal-header">
                    <h2><i :class="'fas ' + (mode === 'add' ? 'fa-user-plus' : 'fa-edit')"></i>
                        {{ mode === 'add' ? 'Добавить абонента' : 'Редактировать абонента' }}</h2>
                </div>
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>ФИО *</label>
                            <input type="text" v-model="form.full_name" placeholder="Иванов Иван Иванович">
                        </div>
                        <div class="form-group flex-1">
                            <label>Должность *</label>
                            <input type="text" v-model="form.position" placeholder="Инженер">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>IP адрес *</label>
                            <div class="flex gap-10">
                                <input type="text" v-model="form.ip" placeholder="192.168.1.100" class="flex-1"
                                       @input="onIpChange" :disabled="mode === 'edit'">
                                <button v-if="mode === 'add'" class="btn btn-info btn-sm" @click="showFreeIps">Свободные IP</button>
                            </div>
                        </div>
                        <div class="form-group flex-1">
                            <label>MAC адрес</label>
                            <input type="text" v-model="form.mac" placeholder="00:11:22:33:44:55">
                        </div>
                    </div>

                    <!-- Traffic visualization -->
                    <div v-if="showTraffic" class="traffic-visualization">
                        <div class="traffic-header">
                            <i class="fas fa-route"></i> Маршрут трафика
                            <span v-if="trafficLoading" style="margin-left: 8px;"><i class="fas fa-spinner fa-spin"></i></span>
                        </div>
                        <div v-if="store.trafficChains && store.trafficChains.length > 0" class="traffic-chains">
                            <div v-for="(chain, ci) in store.trafficChains" :key="ci"
                                 class="traffic-chain" :class="{ backup: chain.type === 'backup' }">
                                <div class="traffic-chain-label">{{ chain.name || 'Канал ' + (ci + 1) }}</div>
                                <div class="traffic-chain-nodes">
                                    <div v-for="(node, ni) in chain.nodes" :key="ni"
                                         class="traffic-node" :class="{ 'has-ip': node.hasIp }"
                                         @click="selectQueue(node)" :title="node.dst || ''">
                                        {{ node.name }}
                                        <span v-if="node.max_limit" class="node-speed">{{ formatSpeed(node.max_limit) }}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div v-else-if="store.trafficChains" style="color: var(--text-muted); font-size: 12px; padding: 12px;">
                            Очереди не найдены для этого IP
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="checkbox-group">
                            <input type="checkbox" v-model="form.internet_access">
                            <span>Доступ в интернет</span>
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" @click="closeModal">
                        <i class="fas fa-times"></i> Отмена
                    </button>
                    <button class="btn btn-success" @click="saveSubscriber" :disabled="saving">
                        <i v-if="saving" class="fas fa-spinner fa-spin"></i>
                        <i v-else class="fas fa-check"></i>
                        {{ mode === 'add' ? 'Добавить' : 'Сохранить' }}
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ====== MAC REPLACE MODAL ====== -->
    <template id="mac-replace-modal">
        <div v-if="showModal" class="modal-overlay" @click.self="closeModal">
            <div class="subscriber-modal-content" style="max-width: 560px;">
                <div class="modal-header">
                    <h2><i class="fas fa-exchange-alt"></i> Замена MAC адреса</h2>
                </div>
                <div class="modal-body">
                    <div class="dialog-current-info" style="background: rgba(87, 148, 242, 0.1); padding: 12px; border-radius: 6px; margin-bottom: 16px;">
                        <div><span style="color: var(--text-muted);">Текущий IP:</span> <strong>{{ macReplaceSub?.ip }}</strong></div>
                        <div><span style="color: var(--text-muted);">Текущий MAC:</span> <strong>{{ macReplaceSub?.mac || '—' }}</strong></div>
                    </div>

                    <div class="mode-switcher" style="margin-bottom: 16px; display: flex; gap: 16px;">
                        <label><input type="radio" v-model="replaceMode" value="by-ip" @change="onReplaceModeChange"> По IP устройства</label>
                        <label><input type="radio" v-model="replaceMode" value="by-mac" @change="onReplaceModeChange"> Ввести MAC вручную</label>
                    </div>

                    <div v-if="replaceMode === 'by-ip'">
                        <div class="form-group">
                            <label>Новый IP (устройство с новым MAC):</label>
                            <div class="flex gap-10">
                                <input type="text" v-model="replaceNewIp" placeholder="192.168.1.100" class="flex-1">
                                <select v-model="replaceNewIp" style="min-width: 140px;">
                                    <option value="">Из списка</option>
                                    <option v-for="s in store.subscribers" :key="s.ip" :value="s.ip">{{ s.ip }} — {{ s.comment || s.mac }}</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div v-if="replaceMode === 'by-mac'">
                        <div class="form-group">
                            <label>Новый MAC адрес:</label>
                            <input type="text" v-model="replaceNewMac" placeholder="AA:BB:CC:DD:EE:FF" style="text-transform:uppercase;">
                        </div>
                        <div class="form-group">
                            <label>Client ID (опционально):</label>
                            <input type="text" v-model="replaceClientId" placeholder="1:aa:bb:cc:dd:ee:ff">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" @click="closeModal"><i class="fas fa-times"></i> Отмена</button>
                    <button class="btn btn-warning" @click="executeReplace" :disabled="replaceRunning">
                        <i v-if="replaceRunning" class="fas fa-spinner fa-spin"></i>
                        <i v-else class="fas fa-exchange-alt"></i> Выполнить замену
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ====== DELETE CONFIRM MODAL ====== -->
    <template id="delete-confirm-modal">
        <div v-if="showModal" class="modal-overlay" @click.self="closeModal">
            <div class="modal-content" style="max-width: 420px;">
                <div class="modal-header" style="background: rgba(212, 74, 58, 0.15);">
                    <h2><i class="fas fa-trash-alt" style="color: var(--error);"></i> Удалить абонента?</h2>
                </div>
                <div class="modal-body">
                    <p style="color: var(--text-secondary);">
                        Абонент <strong>{{ deleteSub?.ip }}</strong> будет удалён из:
                    </p>
                    <ul style="color: var(--text-secondary); margin: 12px 0; padding-left: 20px;">
                        <li>DHCP лизингов</li>
                        <li>ARP таблицы</li>
                        <li>Очередей</li>
                        <li>Address-list'ов файрволла</li>
                    </ul>
                    <p style="color: var(--warning); font-size: 13px;">
                        <i class="fas fa-exclamation-triangle"></i> Это действие необратимо
                    </p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" @click="closeModal"><i class="fas fa-times"></i> Отмена</button>
                    <button class="btn btn-danger" @click="executeDelete" :disabled="deleteRunning">
                        <i v-if="deleteRunning" class="fas fa-spinner fa-spin"></i>
                        <i v-else class="fas fa-trash-alt"></i> Удалить
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ====== QUEUE TAB ====== -->
    <template id="queue-tab">
        <div class="tab-content active">
            <div v-if="!store.connected" class="empty-state" style="padding: 60px 0; text-align: center;">
                <i class="fas fa-plug" style="font-size: 48px; color: var(--text-muted);"></i>
                <p style="margin-top: 16px; color: var(--text-secondary);">Подключитесь к устройству для загрузки очередей</p>
            </div>
            <div v-else class="section">
                <h2><i class="fas fa-sitemap"></i> Дерево очередей</h2>
                <div class="tree-controls">
                    <button class="tree-control-btn" @click="loadTree">
                        <i class="fas fa-sync-alt"></i> Обновить
                    </button>
                    <button class="tree-control-btn" @click="expandAll">
                        <i class="fas fa-expand-alt"></i> Развернуть все
                    </button>
                    <button class="tree-control-btn" @click="collapseAll">
                        <i class="fas fa-compress-alt"></i> Свернуть все
                    </button>
                    <input type="text" class="tree-filter" v-model="treeFilter" placeholder="Фильтр по имени очереди...">
                </div>
                <div class="queue-tree-header">
                    <div class="queue-tree-title">
                        <i class="fas fa-project-diagram"></i> Иерархия очередей
                    </div>
                    <div class="queue-tree-stats" v-if="store.queueStats">
                        Всего: {{ store.queueStats.total_queues || 0 }} |
                        Активно: {{ store.queueStats.enabled_queues || 0 }} |
                        Отключено: {{ store.queueStats.disabled_queues || 0 }} |
                        IP в очередях: {{ store.queueStats.total_ips || 0 }}
                    </div>
                </div>
                <div v-if="filteredTree.length > 0" class="queue-tree-container">
                    <queue-node v-for="node in filteredTree" :key="node.id" :node="node" :depth="0" :expanded-nodes="expandedNodes" @toggle="toggleNode"></queue-node>
                </div>
                <div v-else class="empty-state" style="padding: 40px 0; text-align: center;">
                    <i class="fas fa-sitemap" style="font-size: 36px; color: var(--text-muted);"></i>
                    <p style="margin-top: 12px; color: var(--text-secondary);">{{ store.queueTree.length ? 'Нет совпадений' : 'Дерево очередей пусто' }}</p>
                </div>
            </div>
        </div>
    </template>

    <!-- ====== QUEUE NODE (recursive) ====== -->
    <template id="queue-node">
        <div class="queue-tree-node" :style="{ paddingLeft: depth * 20 + 'px' }">
            <div class="queue-node-row" @click="$emit('toggle', node.id)">
                <span class="queue-node-expand" v-if="node.children && node.children.length > 0">
                    <i :class="'fas fa-chevron-' + (expanded ? 'down' : 'right')"></i>
                </span>
                <span v-else class="queue-node-expand" style="visibility: hidden;">
                    <i class="fas fa-chevron-right"></i>
                </span>
                <span class="queue-node-name" :class="{ disabled: !node.enabled }">
                    {{ node.name }}
                </span>
                <span class="queue-node-target" :title="(node.target || []).join(', ')">
                    {{ node.short_target || '—' }}
                </span>
                <span class="queue-node-dst" v-if="node.short_dst">
                    → {{ node.short_dst }}
                </span>
                <span class="queue-node-limit" v-if="node.max_limit">
                    {{ node.max_limit }}
                </span>
                <span class="queue-node-priority" v-if="node.priority">
                    prio: {{ node.priority }}
                </span>
            </div>
            <template v-if="expanded && node.children && node.children.length > 0">
                <queue-node v-for="child in node.children" :key="child.id" :node="child" :depth="depth + 1" :expanded-nodes="expandedNodes" @toggle="$emit('toggle', $event)"></queue-node>
            </template>
        </div>
    </template>

    <!-- ====== LOADING OVERLAY ====== -->
    <template id="loading-overlay">
        <div v-if="store.loading" class="loading-overlay">
            <div class="loading-spinner">
                <div class="spinner-circle"></div>
                <div class="loading-text">{{ store.loadingMessage || 'Загрузка...' }}</div>
            </div>
        </div>
    </template>

    <!-- ====== ERROR MODAL ====== -->
    <template id="error-modal">
        <div v-if="store.error" class="error-modal">
            <div class="error-modal-content">
                <div class="error-modal-header">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Ошибка</span>
                </div>
                <div class="error-modal-body">{{ store.error }}</div>
                <div class="error-modal-footer">
                    <button class="btn btn-danger" @click="close">
                        <i class="fas fa-times"></i> Закрыть
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ====== NETBOX CONFIG MODAL ====== -->
    <template id="netbox-config-modal">
        <div v-if="store.showNetBoxModal" class="modal-overlay" @click.self="close">
            <div class="modal-content" style="max-width: 500px;">
                <h2><i class="fas fa-server"></i> Настройки NetBox</h2>
                <div class="form-group">
                    <label>URL NetBox *</label>
                    <input type="text" v-model="url" placeholder="http://localhost:8000" class="form-control">
                </div>
                <div class="form-group">
                    <label>API Token *</label>
                    <input type="password" v-model="token" placeholder="Ваш токен NetBox" class="form-control">
                </div>
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" v-model="verifySsl">
                        <span>Проверять SSL сертификат</span>
                    </label>
                </div>
                <div class="flex gap-10" style="margin-top: 25px;">
                    <button class="btn btn-info flex-1" @click="doTest">
                        <i class="fas fa-plug"></i> Проверить
                    </button>
                    <button class="btn btn-success flex-1" @click="doSave">
                        <i class="fas fa-save"></i> Сохранить
                    </button>
                    <button class="btn btn-secondary flex-1" @click="close">
                        <i class="fas fa-times"></i> Отмена
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ====== IP SELECTOR MODAL ====== -->
    <template id="ip-selector-modal">
        <div v-if="store.showIpModal" class="modal-overlay" @click.self="store.showIpModal = false">
            <div class="ip-modal-content">
                <div class="ip-modal-header">
                    <h3><i class="fas fa-search"></i> Выберите свободный IP адрес</h3>
                </div>
                <div class="ip-modal-body">
                    <div v-if="!store.freeIpsData" style="text-align:center;padding:40px;color:var(--text-muted);">
                        <i class="fas fa-spinner fa-spin"></i> Загрузка...
                    </div>
                    <div v-else v-for="(pool, poolName) in store.freeIpsData.free_ips" :key="poolName" style="margin-bottom: 20px;">
                        <h4 style="color:var(--text-secondary);font-size:13px;margin-bottom:8px;">{{ poolName }} (свободно: {{ pool.free_ips }})</h4>
                        <div style="display:flex;flex-wrap:wrap;gap:6px;">
                            <span v-for="ip in pool.free_list" :key="ip"
                                  @click="selectIp(ip)"
                                  style="padding:4px 10px;background:var(--bg-input);border:1px solid var(--border-color);border-radius:4px;font-size:12px;cursor:pointer;color:var(--text-primary);font-family:monospace;"
                                  @mouseenter="$event.target.style.borderColor='var(--accent-primary)'"
                                  @mouseleave="$event.target.style.borderColor='var(--border-color)'">
                                {{ ip }}
                            </span>
                        </div>
                    </div>
                </div>
                <div class="ip-modal-footer">
                    <button class="btn btn-secondary" @click="store.showIpModal = false">
                        <i class="fas fa-times"></i> Отмена
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ====== CREDENTIALS MODAL ====== -->
    <template id="credentials-modal">
        <div v-if="store.showCredentialsModal" class="modal-overlay" style="z-index: 10001;">
            <div class="modal-content" style="max-width: 400px;">
                <h2><i class="fas fa-key"></i> Учётные данные</h2>
                <p style="color: var(--text-secondary); margin-bottom: 16px;">
                    Устройство: <strong>{{ store.credentialsDevice }}</strong>
                </p>
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" v-model="username" class="form-control">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" v-model="password" class="form-control" @keyup.enter="submit">
                </div>
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" v-model="savePassword">
                        <span>Сохранить пароль</span>
                    </label>
                </div>
                <div class="flex gap-10" style="margin-top: 20px;">
                    <button class="btn btn-success flex-1" @click="submit">
                        <i class="fas fa-check"></i> Подключиться
                    </button>
                    <button class="btn btn-secondary flex-1" @click="cancel">
                        <i class="fas fa-times"></i> Отмена
                    </button>
                </div>
            </div>
        </div>
    </template>

    <script src="/static/js/vue.global.prod.js"></script>
    <script src="/static/js/store.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
