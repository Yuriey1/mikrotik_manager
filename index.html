<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikroTik Device Manager</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>[v-cloak]{display:none}</style>
</head>
<body>
    <div id="app" v-cloak>
        <app-header></app-header>
        <div class="main-layout">
            <device-sidebar></device-sidebar>
            <div class="content">
                <tab-bar></tab-bar>
                <subscriber-tab v-if="store.activeTab === 'subscribers'"></subscriber-tab>
                <queue-tab v-if="store.activeTab === 'queues'"></queue-tab>
            </div>
        </div>
        <loading-overlay></loading-overlay>
        <error-modal></error-modal>
        <netbox-config-modal></netbox-config-modal>
        <ip-selector-modal></ip-selector-modal>
        <credentials-modal></credentials-modal>
    </div>

    <!-- ====== APP HEADER ====== -->
    <template id="app-header">
        <header>
            <h1><i class="fas fa-router"></i> MikroTik Device Manager</h1>
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot" :class="{ connected: store.connected, connecting: store.connecting }"></span>
                    <span>{{ store.connecting ? 'Подключение...' : (store.connected ? 'Подключено' : 'Не подключено') }}</span>
                </div>
                <div class="status-item">
                    <i class="fas fa-server"></i>
                    <span>{{ deviceTitle }}</span>
                </div>
                <div class="status-item">
                    <i class="fas fa-sitemap"></i>
                    <span>Очередей: {{ queueCount }}</span>
                </div>
                <div class="status-item">
                    <span class="status-dot" :class="{ connected: store.netboxConfigured }"></span>
                    <span>{{ netboxLabel }}</span>
                </div>
                <div class="status-item">
                    <button class="btn btn-primary" @click="refreshDevices" style="padding: 6px 12px; font-size: 13px;">
                        <i class="fas fa-sync-alt"></i> Обновить
                    </button>
                </div>
                <div class="status-item">
                    <button v-if="store.connected" class="btn btn-danger" @click="doDisconnect"
                            style="padding: 6px 12px; font-size: 13px;">
                        <i class="fas fa-unlink"></i> Отключиться
                    </button>
                </div>
            </div>
        </header>
    </template>

    <!-- ====== DEVICE SIDEBAR ====== -->
    <template id="device-sidebar">
        <div class="sidebar">
            <div class="device-section">
                <h2>
                    <i class="fas fa-server"></i> Устройства
                    <button class="btn btn-secondary" @click="openNetBoxConfig"
                            style="margin-left: auto; padding: 4px 8px; font-size: 12px;" title="Настройки NetBox">
                        <i class="fas fa-cog"></i>
                    </button>
                </h2>
                <div class="device-search-container">
                    <i class="fas fa-search device-search-icon"></i>
                    <input type="text" v-model="searchQuery" class="device-search-input"
                           placeholder="Быстрый поиск устройства..." autocomplete="off">
                    <button v-if="searchQuery" class="device-search-clear" @click="searchQuery = ''">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="device-list-container">
                    <div class="device-list-header">
                        <span>Список устройств</span>
                        <span class="device-count">{{ filteredDevices.length }}</span>
                    </div>
                    <div class="device-list-scroll">
                        <ul class="device-list">
                            <li v-if="store.devicesLoading" class="device-item">
                                <div class="device-card">
                                    <div class="device-name" style="text-align:center;">
                                        <i class="fas fa-spinner fa-spin"></i> Загрузка...
                                    </div>
                                </div>
                            </li>
                            <li v-else-if="filteredDevices.length === 0" class="device-item">
                                <div class="device-card">
                                    <div class="device-name" style="text-align:center;">Нет устройств</div>
                                </div>
                            </li>
                            <li v-for="d in filteredDevices" :key="d.name" class="device-item">
                                <div class="device-card" :class="{ connected: store.currentDevice === d.name && store.connected }">
                                    <div class="device-name">{{ d.name }}</div>
                                    <div class="device-ip">{{ d.ip }}</div>
                                    <div class="device-type" v-if="d.device_type">{{ d.device_type }}</div>
                                    <div v-if="store.currentDevice === d.name && store.connected" class="device-status-label">✓ Подключено</div>
                                    <div class="device-actions">
                                        <button v-if="store.currentDevice === d.name && store.connected"
                                                @click="doDisconnect" class="btn btn-danger btn-sm">
                                            <i class="fas fa-unlink"></i>
                                        </button>
                                        <button v-else @click="doConnect(d.name)" class="btn btn-primary btn-sm"
                                                :disabled="store.connecting">
                                            <i v-if="store.connecting && store.connectingDevice === d.name" class="fas fa-spinner fa-spin"></i>
                                            <i v-else class="fas fa-plug"></i>
                                            {{ store.connecting && store.connectingDevice === d.name ? 'Подключение...' : 'Подключиться' }}
                                        </button>
                                    </div>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
                <button class="btn btn-primary w-full" @click="loadDevices" style="margin-top: 10px; padding: 8px;">
                    <i class="fas fa-sync-alt"></i> Обновить список
                </button>
            </div>
            <div class="section">
                <h2><i class="fas fa-cog"></i> Настройки</h2>
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" v-model="store.autoSavePassword">
                        <span>Сохранять пароли</span>
                    </label>
                </div>
                <div class="form-group">
                    <label>Имя пользователя по умолчанию</label>
                    <input type="text" v-model="store.defaultUsername">
                </div>
                <button class="btn btn-success w-full" @click="doSaveSettings">
                    <i class="fas fa-save"></i> Сохранить настройки
                </button>
            </div>
        </div>
    </template>

    <!-- ====== TAB BAR ====== -->
    <template id="tab-bar">
        <div class="tab-container">
            <div v-for="t in tabs" :key="t.key" class="tab"
                 :class="{ active: store.activeTab === t.key }"
                 @click="store.activeTab = t.key">
                <i :class="'fas ' + t.icon"></i> {{ t.label }}
            </div>
        </div>
    </template>

    <!-- ====== SUBSCRIBER TAB (placeholder) ====== -->
    <template id="subscriber-tab">
        <div class="tab-content active">
            <div class="section">
                <h2><i class="fas fa-users"></i> Абоненты</h2>
                <div v-if="!store.connected" class="empty-state" style="padding: 60px 0;">
                    <i class="fas fa-plug" style="font-size: 48px; color: var(--text-muted);"></i>
                    <p style="margin-top: 16px; color: var(--text-secondary);">Подключитесь к устройству для загрузки абонентов</p>
                </div>
                <div v-else style="padding: 40px 0; text-align: center; color: var(--text-secondary);">
                    <i class="fas fa-tools" style="font-size: 36px; display: block; margin-bottom: 12px;"></i>
                    Таблица абонентов будет здесь (Фаза 4)
                </div>
            </div>
        </div>
    </template>

    <!-- ====== QUEUE TAB (placeholder) ====== -->
    <template id="queue-tab">
        <div class="tab-content active">
            <div class="section">
                <h2><i class="fas fa-sitemap"></i> Очереди</h2>
                <div v-if="!store.connected" class="empty-state" style="padding: 60px 0;">
                    <i class="fas fa-plug" style="font-size: 48px; color: var(--text-muted);"></i>
                    <p style="margin-top: 16px; color: var(--text-secondary);">Подключитесь к устройству для загрузки очередей</p>
                </div>
                <div v-else class="tree-controls" style="margin-bottom: 16px;">
                    <button class="tree-control-btn" @click="loadQueueTree">
                        <i class="fas fa-sync-alt"></i> Обновить
                    </button>
                </div>
                <div v-if="store.connected && store.queueTree.length > 0">
                    <div class="queue-tree-header">
                        <div class="queue-tree-title">
                            <i class="fas fa-project-diagram"></i> Иерархия очередей
                        </div>
                        <div class="queue-tree-stats">
                            Всего: {{ store.queueStats?.total_queues || 0 }} |
                            Активно: {{ store.queueStats?.enabled_queues || 0 }}
                        </div>
                    </div>
                    <div style="padding: 40px 0; text-align: center; color: var(--text-secondary);">
                        Дерево очередей будет здесь (Фаза 4)
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- ====== LOADING OVERLAY ====== -->
    <template id="loading-overlay">
        <div v-if="store.loading" class="loading-overlay">
            <div class="loading-spinner">
                <div class="spinner-circle"></div>
                <div class="loading-text">{{ store.loadingMessage || 'Загрузка...' }}</div>
            </div>
        </div>
    </template>

    <!-- ====== ERROR MODAL ====== -->
    <template id="error-modal">
        <div v-if="store.error" class="error-modal">
            <div class="error-modal-content">
                <div class="error-modal-header">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Ошибка</span>
                </div>
                <div class="error-modal-body">{{ store.error }}</div>
                <div class="error-modal-footer">
                    <button class="btn btn-danger" @click="close">
                        <i class="fas fa-times"></i> Закрыть
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ====== NETBOX CONFIG MODAL ====== -->
    <template id="netbox-config-modal">
        <div v-if="store.showNetBoxModal" class="modal-overlay" @click.self="close">
            <div class="modal-content" style="max-width: 500px;">
                <h2><i class="fas fa-server"></i> Настройки NetBox</h2>
                <div class="form-group">
                    <label>URL NetBox *</label>
                    <input type="text" v-model="url" placeholder="http://localhost:8000" class="form-control">
                </div>
                <div class="form-group">
                    <label>API Token *</label>
                    <input type="password" v-model="token" placeholder="Ваш токен NetBox" class="form-control">
                </div>
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" v-model="verifySsl">
                        <span>Проверять SSL сертификат</span>
                    </label>
                </div>
                <div class="flex gap-10" style="margin-top: 25px;">
                    <button class="btn btn-info flex-1" @click="doTest">
                        <i class="fas fa-plug"></i> Проверить
                    </button>
                    <button class="btn btn-success flex-1" @click="doSave">
                        <i class="fas fa-save"></i> Сохранить
                    </button>
                    <button class="btn btn-secondary flex-1" @click="close">
                        <i class="fas fa-times"></i> Отмена
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ====== IP SELECTOR MODAL (placeholder) ====== -->
    <template id="ip-selector-modal">
        <div v-if="store.showIpModal" class="modal-overlay" @click.self="store.showIpModal = false">
            <div class="ip-modal-content">
                <div class="ip-modal-header">
                    <h3><i class="fas fa-search"></i> Выберите свободный IP адрес</h3>
                </div>
                <div class="ip-modal-body">
                    <p style="color: var(--text-secondary); text-align: center; padding: 40px;">
                        Выбор IP будет реализован в Фазе 4
                    </p>
                </div>
                <div class="ip-modal-footer">
                    <button class="btn btn-secondary" @click="store.showIpModal = false">
                        <i class="fas fa-times"></i> Отмена
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ====== CREDENTIALS MODAL ====== -->
    <template id="credentials-modal">
        <div v-if="store.showCredentialsModal" class="modal-overlay" style="z-index: 10001;">
            <div class="modal-content" style="max-width: 400px;">
                <h2><i class="fas fa-key"></i> Учётные данные</h2>
                <p style="color: var(--text-secondary); margin-bottom: 16px;">
                    Устройство: <strong>{{ store.credentialsDevice }}</strong>
                </p>
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" v-model="username" class="form-control">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" v-model="password" class="form-control" @keyup.enter="submit">
                </div>
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" v-model="savePassword">
                        <span>Сохранить пароль</span>
                    </label>
                </div>
                <div class="flex gap-10" style="margin-top: 20px;">
                    <button class="btn btn-success flex-1" @click="submit">
                        <i class="fas fa-check"></i> Подключиться
                    </button>
                    <button class="btn btn-secondary flex-1" @click="cancel">
                        <i class="fas fa-times"></i> Отмена
                    </button>
                </div>
            </div>
        </div>
    </template>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="/static/js/store.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
