<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikroTik Device Manager</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <!-- В секции статуса в header -->
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-dot" id="connection-status"></div>
                    <span id="connection-text">Не подключено</span>
                </div>
                <div class="status-item" id="device-name"></div>
                <div class="status-item" id="queue-stats"></div>
                <div class="status-item">
                    <button class="connect-btn btn-danger" onclick="disconnectDevice()" 
                            id="disconnect-btn" style="display: none; padding: 5px 10px; font-size: 12px;">
                        🔓 Отключиться
                    </button>
                 </div>
            </div>
        </header>
        <div class="main-layout">
            <div class="sidebar">
                <div class="section">
                    <h2>📱 Устройства</h2>
                    <button class="btn" onclick="showAddDeviceForm()">+ Добавить устройство</button>
                    <ul class="device-list" id="device-list"></ul>
                </div>

                <div class="section">
                    <h2>⚙️ Настройки</h2>
                    <div class="form-group">
                        <label><input type="checkbox" id="auto-save-password"> Сохранять пароли</label>
                    </div>
                    <div class="form-group">
                        <label>Имя пользователя по умолчанию</label>
                        <input type="text" id="default-username" value="admin">
                    </div>
                    <button class="btn btn-success" onclick="saveSettings()">💾 Сохранить настройки</button>
                </div>
            </div>

            <div class="content">
                <div class="tab-container">
                    <div class="tab active" onclick="switchTab('employee')">👤 Добавить сотрудника</div>
                    <div class="tab" onclick="switchTab('queues')">🌳 Дерево очередей</div>
                    <div class="tab" onclick="switchTab('tools')">🔧 Инструменты</div>
                </div>

                <div id="employee-tab" class="tab-content active">
                    <div class="section">
                        <h2>Добавить сотрудника</h2>
                        <div class="form-group">
                            <label>ФИО *</label>
                            <input type="text" id="full-name" placeholder="Иванов Иван Иванович">
                        </div>
                        <div class="form-group">
                            <label>Должность *</label>
                            <input type="text" id="position" placeholder="Инженер">
                        </div>
                        <div class="form-group">
                            <label>IP адрес *</label>
                            <input type="text" id="ip-address" placeholder="192.168.1.100">
                            <button class="btn btn-warning" onclick="checkDHCP()" style="margin-top: 5px; width: auto;">🔍 Проверить DHCP</button>
                        </div>
                        <div class="form-group">
                            <label>MAC адрес</label>
                            <input type="text" id="mac-address" placeholder="00:11:22:33:44:55">
                        </div>
                        <div class="form-group">
                            <label class="checkbox-group">
                                <input type="checkbox" id="internet-access"> Доступ в интернет
                            </label>
                        </div>
                        <div class="form-group">
                            <label>Очередь</label>
                            <select id="queue-select">
                                <option value="">-- Не выбрана --</option>
                            </select>
                            <button class="btn btn-warning" onclick="findQueues()" style="margin-top: 5px; width: auto;">🔍 Найти очереди для IP</button>
                        </div>
                        <button class="btn btn-success" onclick="addEmployee()">✅ Добавить сотрудника</button>
                        <div id="employee-results" class="results"></div>
                    </div>
                </div>

                <div id="queues-tab" class="tab-content">
                    <div class="section">
                        <h2>Дерево очередей</h2>
                        <button class="btn" onclick="loadQueueTree()">🔄 Обновить дерево</button>
                        <div id="queue-tree" class="queue-tree"></div>
                    </div>
                </div>

                <div id="tools-tab" class="tab-content">
                    <div class="section">
                        <h2>Инструменты</h2>
                        <div class="form-group">
                            <label>IP для проверки</label>
                            <input type="text" id="check-ip" placeholder="192.168.1.100">
                            <button class="btn" onclick="checkIP()">🔍 Проверить IP</button>
                        </div>
                        <div id="tools-results"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для добавления устройства -->
    <div id="device-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div style="background: white; width: 500px; margin: 100px auto; padding: 20px; border-radius: 10px;">
            <h2>➕ Добавить устройство</h2>
            <div class="form-group">
                <label>Имя устройства *</label>
                <input type="text" id="device-name-input" placeholder="Роутер офиса">
            </div>
            <div class="form-group">
                <label>IP адрес *</label>
                <input type="text" id="device-ip" placeholder="192.168.88.1">
            </div>
            <div class="form-group">
                <label>Порт</label>
                <input type="number" id="device-port" value="8728">
            </div>
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" id="device-username" value="admin">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="device-password">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="device-description" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label class="checkbox-group">
                    <input type="checkbox" id="save-password"> Сохранить пароль
                </label>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-success" onclick="saveDevice()">💾 Сохранить</button>
                <button class="btn btn-danger" onclick="hideAddDeviceForm()">❌ Отмена</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
